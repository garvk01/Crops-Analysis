services:
  - type: web
    name: cropcycle-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel frontend URL
